<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta content="width=device-width,initial-scale=1" name="viewport">
<link href="data:image/x-icon;," rel="icon">
<title>Humax EPG (html-epg-viewer)</title>
<!-- Local assets (fork): avoid CORS / github.io dependency when hosted on HA /local/epg/ -->
<link href="xml-epg.css" rel="stylesheet">
<style>
body{margin:0;font-family:Arial,sans-serif;display:flex;height:100vh;background-color:#282c34}
#playlist{width:350px;background-color:#282c34;color:#fff;overflow-y:auto;border-right:1px solid #444;padding:20px;box-shadow:2px 0 5px rgb(0 0 0 / .2);display:flex;flex-direction:column}
#search-input,#url-input{width:100%;padding:10px;margin-bottom:10px;border:1px solid #444;border-radius:5px;background-color:#3c4043;color:#fff;font-size:1em;box-sizing:border-box}
#epg-button{display:none;width:100%;padding:10px;margin-bottom:10px;background-color:#61dafb;color:#000;border:none;border-radius:5px;font-size:1em;cursor:pointer;box-shadow:0 4px 8px rgb(0 0 0 / .3)}
#fetch-button{width:100%;padding:10px;margin-bottom:10px;background-color:#61dafb;color:#000;border:none;border-radius:5px;font-size:1em;cursor:pointer;box-shadow:0 4px 8px rgb(0 0 0 / .3)}
#fetch-button:hover,#epg-button:hover{background-color:#4fa3c4}
#video-list{list-style:none;padding:0;margin:0}
#video-list li{padding:10px;margin:5px 0;border-radius:5px;cursor:pointer;transition:background-color .3s ease,transform .2s ease;display:flex;align-items:center}
#video-list li:hover{background-color:#61dafb;transform:scale(1.05)}
#video-list img{width:50px;height:50px;margin-right:10px;border-radius:5px;object-fit:contain}
.active{background-color:#4fa3c4}
#overlay{display:none;flex-direction:column;align-items:center;overflow-y:auto;z-index:2;flex:1}
#epg-container{display:none;z-index:1000;position:fixed;width:100%;height:100%;overflow:scroll;background-color:#282c34}
#search-input{display:none}
#hint{font-size:.85em;color:#aaa;margin-bottom:12px;line-height:1.35}
</style>
<div id="playlist">
  <div id="hint">Fork of <a href="https://github.com/dbghelp/html-epg-viewer" style="color:#61dafb">html-epg-viewer</a> — defaults to Humax XMLTV on this HA host.</div>
  <input id="url-input" placeholder="XMLTV URL or relative path" value="humax-epg.xml">
  <button id="fetch-button">Load EPG</button>
  <button id="epg-button" onclick="openEPG()">EPG (all channels)</button>
  <input id="search-input" placeholder="Search channels…">
  <ul id="video-list"></ul>
</div>
<div id="overlay" style="display:flex"></div>
<div id="epg-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.0.4/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="xml-epg.js"></script>
<script>
var xmlepg = new XMLEPG();
var overlay = document.getElementById('overlay');
var epgContainer = document.getElementById('epg-container');
/** Default same-origin Humax cache (no CORS). Override with ?file=… */
var DEFAULT_EPG = 'humax-epg.xml';

document.addEventListener('DOMContentLoaded', () => {
  const videoList = document.getElementById('video-list');
  const searchInput = document.getElementById('search-input');
  const urlInput = document.getElementById('url-input');
  const fetchButton = document.getElementById('fetch-button');
  var channels;
  var lastActiveChannel;

  var extracted = extractAppendedURL();
  urlInput.value = extracted;
  setPlaylist(extracted);

  fetchButton.addEventListener('click', async () => {
    setPlaylist(urlInput.value.trim());
  });

  async function setPlaylist(url) {
    if (!url) return;
    try {
      const response = await fetch(url);
      if (!response.ok) {
        console.error('Failed to fetch EPG:', response.status, url);
        alert('Failed to load EPG (' + response.status + '): ' + url);
        return;
      }
      await response.text(); // warm / validate reachability
      const urls = [url];
      await xmlepg.load(urls);
      await xmlepg.displayAllPrograms('epg-container', 'xmlepg');
      document.getElementById('epg-button').style.display = 'block';
      channels = xmlepg.channels;
      updatePlaylist(channels);
      document.getElementById('search-input').style.display = 'block';
      // Open timeline immediately for Humax / local use
      openEPG();
    } catch (error) {
      console.error('Error fetching EPG:', error);
      alert('Error loading EPG: ' + error);
    }
  }

  function extractAppendedURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('file') || DEFAULT_EPG;
  }

  function updatePlaylist(channels) {
    videoList.innerHTML = '';
    channels.forEach(channel => {
      const listItem = document.createElement('li');
      const logo = channel.tvgLogo || '';
      listItem.innerHTML = (logo ? `<img src="${logo}" alt="">` : '') +
        `<span class="video-title">${channel.channelName}</span>`;
      listItem.onclick = () => {
        epgContainer.style.display = 'none';
        overlay.style.display = 'flex';
        xmlepg.displayPrograms('overlay', channel.tvgId);
        const children = videoList.getElementsByTagName('li');
        for (let i = 0; i < children.length; i++) {
          children[i].classList.remove('active');
        }
        listItem.classList.add('active');
        lastActiveChannel = listItem.innerHTML;
      };
      videoList.appendChild(listItem);
    });
  }

  function filterPlaylist(searchTerm) {
    const filtered = channels.filter(c =>
      c.channelName.toLowerCase().includes(searchTerm.toLowerCase())
    );
    updatePlaylist(filtered);
  }

  searchInput.addEventListener('input', (event) => {
    filterPlaylist(event.target.value);
  });
});

function openEPG() {
  overlay.style.display = 'none';
  epgContainer.style.display = 'block';
  xmlepg.timelineNeedleRender();
}
</script>
